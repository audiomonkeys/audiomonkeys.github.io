html<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudioMonkeys</title>
<style>
    /* Base Styling & Background */
    body { 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
        margin: 0;
        padding: 20px;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #0f0f14 0%, #1a1a24 50%, #0a0a0f 100%);
        background-image: 
            radial-gradient(rgba(255, 153, 0, 0.15) 1px, transparent 0),
            radial-gradient(rgba(255, 153, 0, 0.1) 1px, transparent 0);
        background-size: 24px 24px;
        background-position: 0 0, 12px 12px;
        color: #ffffff; 
        box-sizing: border-box;
    }

    /* Responsive Full-Screen Container */
    .container { 
        width: 100%;
        max-width: 800px; /* Expanded from 600px for a full-screen feel */
        background: rgba(25, 25, 35, 0.85); 
        padding: 30px; 
        border-radius: 16px; 
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 153, 0, 0.2);
        text-align: center;
        box-sizing: border-box;
    }

    /* Typography */
    h1 { 
        color: #ff9900; 
        font-size: 2.5rem; 
        margin: 0 0 10px 0; 
        letter-spacing: 1px;
    }
    
    .tagline {
        color: #a0a0b0; 
        font-size: 1.1rem;
        margin-bottom: 25px; 
        line-height: 1.4;
    }

    /* Flexible Height Form Container */
    .form-wrapper {
        position: relative;
        border-radius: 8px;
        overflow: hidden;
        background: #ffffff; 
        box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        width: 100%;
    }

    /* Expanded Iframe Height to stop clipping */
    iframe { 
        width: 100%; 
        height: 850px; /* Increased from 600px to display the full survey without cutting off */
        border: none;
        display: block;
    }

    /* Mobile optimization so it scales beautifully on small screens */
    @media (max-width: 600px) {
        body { padding: 10px; }
        .container { padding: 15px; }
        h1 { font-size: 1.8rem; }
        iframe { height: 1000px; } /* Gives extra room for fields stacked vertically on phones */
    }
</style>
</head>
<body>

    <div class="container">
        
        <div class="tagline">Taking away monkey work so you can enjoy your home audio system again.</div>
        
        <div class="form-wrapper">

    </div>

</body>
</html>
